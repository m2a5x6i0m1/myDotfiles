##############
### Config ###
##############

### Color theme ###
source = $HOME/.config/hypr/modules/themes/mocha.conf

### Monitors ###
monitor=eDP-1,2560x1600@165,0x0,1.6

### Autostart ###
exec-once = uwsm app -- hyprlock
exec-once = uwsm app -- hyprsunset -i
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- swaync 

### Polkit ###
exec-once = systemctl --user start hyprpolkitagent

### Clipboard Support ###
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

### Clipboard History ###
exec-once = uwsm app -- wl-paste --watch cliphist store

### Clipboard Persistense ###
exec-once = uwsm app -- wl-clip-persist --clipboard regular

general {
  border_size = 1
  gaps_in = 0
  gaps_out = 0

  col.inactive_border = $surface2
  col.active_border = $lavender
  resize_on_border = true
}

decoration {
  dim_inactive = true
  dim_strength = 0.2

  blur {
    enabled = false
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = false
}

input {
  kb_layout = us,ru
  kb_options = grp:win_space_toggle, caps:swapescape
  repeat_rate = 35
  repeat_delay = 200

  force_no_accel = true
}

device {
  name = syna2ba6:00-06cb:cf00-touchpad
  enabled = 0
  sensitivity = -0.2
}

misc {
  disable_splash_rendering = true
  new_window_takes_over_fullscreen = 1
  disable_hyprland_logo = true
  background_color = rgb(0,0,0)
}

binds {
  workspace_center_on = 1
  movefocus_cycles_fullscreen = true
  disable_keybind_grabbing = false
}

dwindle {
  preserve_split = true
  force_split = 1
}

xwayland {
  force_zero_scaling = true
}

cursor {
  hide_on_key_press = true
}

ecosystem {
  no_update_news = true
  no_donation_nag = true
}

### Keybindings ###
source = ./modules/binds.conf

##############################
### Windows And Workspaces ###
##############################

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
