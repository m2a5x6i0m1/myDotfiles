##############
### Config ###
##############

### Monitors ###
monitor=DP-2,2560x1440@180,0x0,1.0

### Autostart ###
exec-once = uwsm app -- hyprlock
exec-once = uwsm app -- hyprsunset
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- swaync 

### Clipboard ###
exec-once = uwsm app -- wl-clipboard-history -t
exec-once = uwsm app -- wl-paste --watch cliphist store
exec-once = uwsm app -- wl-clip-persist --clipboard regular --display wayland-1
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

### Polkit ###
exec-once = systemctl --user start hyprpolkitagent

general {
  border_size = 1
  gaps_in = 1
  gaps_out = 1

  col.inactive_border = rgba(595959aa)
  layout = dwindle
  resize_on_border = true
}

decoration {
  dim_inactive = true
  dim_strength = 0.2

  blur {
    enabled = false
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = false
  first_launch_animation = false
}

input {
  kb_layout = us,ru
  kb_options = grp:win_space_toggle, caps:swapescape

  force_no_accel = true
  accel_profile = flat
}

device {
  name = elan1200:00-04f3:3067-touchpad
  enabled = 1
  accel_profile = adaptive
  sensitivity = -0.1
}

misc {
  disable_splash_rendering = true
  new_window_takes_over_fullscreen = 1
  disable_hyprland_logo = true
}

binds {
  workspace_center_on = 1
  movefocus_cycles_fullscreen = true
  disable_keybind_grabbing = false
}

dwindle {
  preserve_split = true
  force_split = 1
}

cursor {
  hide_on_key_press = true
}

ecosystem {
  no_update_news = true
  no_donation_nag = true
}

debug {
  disable_logs = false
}

### Keybindings ###
source = ./modules/binds.conf

##############################
### Windows And Workspaces ###
##############################

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
